# Workspace file ownership. Everyone reads; only the owner writes.
# Enforced by the state-integrity skill and scripts/validate_package.py.
workspace_files:
  - charter.md
  - goals.md
  - metrics.md
  - offer.md
  - pipeline.md
  - week.md
  - queue.md
  - clients/
  - network.md
  - skills.md
  - content.md
  - voice.md
  - systems.md
  - decisions/
  - reviews/daily/
  - reviews/weekly/
  - reviews/monthly/
  - reviews/quarterly/

owns:
  chief-of-staff:
    - charter.md
    - queue.md
    - decisions/
    - reviews/daily/
    - reviews/weekly/
    - reviews/monthly/
  strategist:
    - goals.md
    - reviews/quarterly/
  cfo:
    - metrics.md
  positioning-advisor:
    - offer.md
  pipeline-coach:
    - pipeline.md
  focus-coach:
    - week.md
  delivery-lead:
    - clients/
  network-manager:
    - network.md
  skills-mentor:
    - skills.md
  brand-editor:
    - content.md
    - voice.md
  ops-engineer:
    - systems.md

# The section contract. `owns:` says who may write a file; this says what is
# inside it. Both halves are needed: an owner who invents a heading every run
# produces a file only that run can read.
#
# A heading may carry a dated suffix after the section name — `## Close — 2026-07`,
# `## Gap — 2026-07-15`. The section name is what is pinned; the suffix is not.
#
# For every flat file below, this is the required list, and it is enforced three
# ways: `founder-os-init` scaffolds exactly these headings, `founder-os-doctor`
# reports a file that has lost one or grown one, and `check_sections` in
# scripts/validate_package.py fails the build if a skill writes a path this key
# does not declare.
#
# This comment carries no count of the files, on purpose. The last one said "ten"
# and stayed at ten while `queue.md` and `voice.md` were added twenty lines below
# it, by the edit that added them. A count of a set that grows is a second map
# with one field in it, and second maps go stale silently — `state-integrity`
# says so and this file should not be the exception. Count the keys.
#
# Directory paths hold one file per instance — a client, a decision, a review.
# Init creates the directory, not its members, so for those paths this list is
# the section vocabulary their member files use. It is enforced at write time by
# the skill that owns the template, not at scaffold time. `clients/_capacity.md`
# is an aggregate rather than a client file and carries none of these.
sections:
  charter.md:
    - "## Business"
    - "## North star"
    - "## Timezone"
  goals.md:
    - "## Bets"
  metrics.md:
    - "## Close"
