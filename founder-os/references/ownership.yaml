    - reviews/quarterly/
  cfo:
    - metrics.md
  positioning-advisor:
    - offer.md
  pipeline-coach:
    - pipeline.md
    - drafts/outreach/
    - drafts/proposals/
  focus-coach:
    - week.md
  delivery-lead:
    - clients/
  network-manager:
