  - charter.md
  - goals.md
  - metrics.md
  - offer.md
  - pipeline.md
  - week.md
  - queue.md
  - clients/
  - drafts/outreach/
  - drafts/proposals/
  - drafts/content/
  - network.md
  - skills.md
  - content.md
  - voice.md
  - systems.md
  - decisions/
  - reviews/daily/
  - reviews/weekly/
  - reviews/monthly/
  - reviews/quarterly/

owns:
  chief-of-staff:
    - charter.md
    - inbox.md
    - queue.md
    - decisions/
    - reviews/daily/
    - reviews/weekly/
    - reviews/monthly/
  strategist:
