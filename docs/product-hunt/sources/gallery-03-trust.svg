<svg xmlns="http://www.w3.org/2000/svg" width="1270" height="760" viewBox="0 0 1270 760" role="img" aria-labelledby="title desc">
  <title id="title">Founder OS trust model</title>
  <desc id="desc">Local Markdown, explicit ownership, source provenance, and no automatic sending or payments.</desc>
  <rect width="1270" height="760" fill="#f2eee4"/>
  <rect x="0" y="0" width="1270" height="190" fill="#f15a35"/>
  <text x="70" y="72" fill="#122127" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" letter-spacing="4">TRUST IS A VISIBLE SYSTEM</text>
  <text x="70" y="146" fill="#122127" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="800" letter-spacing="-3">Trust you can inspect.</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="70" y="240" width="535" height="182" rx="24" fill="#102025"/>
    <text x="104" y="286" fill="#d7f36b" font-size="17" font-weight="800" letter-spacing="3">01 · LOCAL MARKDOWN</text>
    <text x="104" y="336" fill="#fffdf7" font-size="28" font-weight="800">State you can open.</text>
    <text x="104" y="376" fill="#aebcb8" font-size="20">One workspace per business. No Founder OS cloud.</text>
    <rect x="665" y="240" width="535" height="182" rx="24" fill="#d7f36b"/>
    <text x="699" y="286" fill="#122127" font-size="17" font-weight="800" letter-spacing="3">02 · EXPLICIT OWNERSHIP</text>
    <text x="699" y="336" fill="#122127" font-size="28" font-weight="800">One owner per file.</text>
    <text x="699" y="376" fill="#344045" font-size="20">Crossed boundaries are refused, not silently merged.</text>
    <rect x="70" y="452" width="535" height="182" rx="24" fill="#fffaf0" stroke="#122127" stroke-width="2"/>
    <text x="104" y="498" fill="#ba351c" font-size="17" font-weight="800" letter-spacing="3">03 · SOURCE + DATE</text>
    <text x="104" y="548" fill="#122127" font-size="28" font-weight="800">Claims keep their provenance.</text>
    <text x="104" y="588" fill="#4d5a5e" font-size="20">The brief points back to the evidence behind it.</text>
    <rect x="665" y="452" width="535" height="182" rx="24" fill="#102025"/>
    <text x="699" y="498" fill="#f15a35" font-size="17" font-weight="800" letter-spacing="3">04 · NO HIDDEN ACTIONS</text>
    <text x="699" y="548" fill="#fffdf7" font-size="28" font-weight="800">Never sends. Never pays.</text>
    <text x="699" y="588" fill="#aebcb8" font-size="20">It drafts and records. The founder presses the button.</text>
  </g>
  <text x="70" y="697" fill="#4d5a5e" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="800">PROMPTS AND CONTEXT STILL FOLLOW YOUR CLAUDE CODE OR CODEX DATA-HANDLING TERMS.</text>
</svg>
